<div
  xmlns:i18n="http://exist-db.org/xquery/i18n"
  data-template="templates:surround"
  data-template-with="templates/page.html"
  data-template-at="content"
>
  <div
    data-template="templates:include"
    data-template-path="templates/menu.html"
  />
  <section class="container-fluid">
    <header class="row">
      <div class="col-md-12">
        <div class="page-header">
          <!--                    <h1 data-template="config:app-title"/>-->
          <h1>
            <i18n:text key="doctitel" />
          </h1>
        </div>
      </div>
    </header>
    <main class="row">
      <section class="col-md-3 col-md-push-9">
        <div
          data-template="templates:include"
          data-template-path="templates/search.html"
        />
        <div class="panel panel-info" data-template="browse:show-if-logged-in">
          <div class="panel-heading">
            <h3 class="panel-title">
              <i18n:text key="upload" />
            </h3>
          </div>

          <div class="panel-body">
            <p>
              <i18n:text key="upload-files" />
            </p>

            <span class="btn btn-success btn-block fileinput-button">
              <i class="material-icons">file_upload</i>
              <span>
                <i18n:text key="select-files" />
              </span>
              <input
                id="fileupload"
                type="file"
                name="files[]"
                multiple="multiple"
              />
            </span>
            <!-- The global progress bar -->
            <div id="progress" class="progress">
              <div class="progress-bar progress-bar-success" />
            </div>
            <!-- The container for the uploaded files -->
            <table id="files-table" class="files table table-striped">
              <thead>
                <th colspan="2">
                  <i18n:text key="uploaded-files" />
                </th>
              </thead>
              <tbody id="files" />
            </table>
          </div>
        </div>
      </section>
      <section class="col-md-9 col-md-pull-3">
        <div class="panel panel-default">
          <div class="panel-heading">
            <h3 class="panel-title">
              <i18n:text key="documents">Documents</i18n:text>
            </h3>
          </div>
          <div class="panel-body">
            <div
              data-template="templates:if-parameter-unset"
              data-template-param="collection"
            >
              <div
                data-template="ssrq-utils:loadStatic"
                data-template-page="cantons"
              />
            </div>
            <div
              data-template="templates:if-parameter-set"
              data-template-param="collection"
            >
            <div data-template="ssrq-utils:findView"/>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div
      data-template="templates:include"
      data-template-path="templates/footer.html"
    />
  </section>
  <script
    type="text/javascript"
    src="resources/scripts/vendor/jquery.ui.widget.js"
  />
  <script
    type="text/javascript"
    src="resources/scripts/vendor/jquery.iframe-transport.js"
  />
  <script
    type="text/javascript"
    src="resources/scripts/vendor/jquery.fileupload.js"
  />
  <script type="text/javascript">
    $(function () {
      'use strict';

      function reloadDocTable() {
        $('#documents-panel').load('templates/doc-table.html');
      }
      $('#fileupload')
        .fileupload({
          url: 'modules/lib/upload.xql',
          dataType: 'json',
          done: function (e, data) {
            $.each(data.result.files, function (index, file) {
              var tr = document.createElement('tr');
              var td = document.createElement('td');
              var link = document.createElement('a');
              link.href = file.path;
              link.target = '_blank';
              var icon = document.createElement('span');
              icon.className = 'material-icons';
              icon.appendChild(document.createTextNode('open_in_new'));
              link.appendChild(icon);
              td.appendChild(link);
              tr.appendChild(td);
              td = document.createElement('td');
              td.appendChild(document.createTextNode(file.path));
              tr.appendChild(td);
              $('#files').append(tr);
            });
            reloadDocTable();
          },
          progressall: function (e, data) {
            var progress = parseInt((data.loaded / data.total) * 100, 10);
            $('#progress .progress-bar').css('width', progress + '%');
          },
        })
        .prop('disabled', !$.support.fileInput)
        .parent()
        .addClass($.support.fileInput ? undefined : 'disabled');
    });
  </script>
</div>
