<?xml version="1.0" encoding="UTF-8"?>
<html data-template="pages:app-root">
    <head data-template="templates:include" data-template-path="templates/head-facs.html"/>
    <body xmlns:i18n="http://exist-db.org/xquery/i18n">
        <div data-template="templates:surround" data-template-with="templates/page.html" data-template-at="content" data-template-using="body">
            <div data-template="pages:load">
                <!-- Navigation -->
                <div data-template="templates:include" data-template-path="templates/menu.html"/>
                <!-- Toolbar -->
                <div data-template="templates:include" data-template-path="templates/toolbar.html"/>

                <section id="tp-canvas">
                    <!-- Table of contents -->
                    <nav id="sidebar" class="toc offcanvas">
                        <h3><i18n:text key="contents">Contents</i18n:text></h3>
                        <div id="toc">
                            <span id="toc-loading">Loading ...</span>
                        </div>
                    </nav>
                    <main id="main-wrapper" class="col-md-5" data-template="pages:navigation">
                        <div class="tp-document-title-wrapper tp-row">
                            <div class="tp-column">
                                <!-- Document title -->
                                <h5 data-template="app:idno"/>
                                <h4 data-template="app:header-short"/>
                                <h5 data-template="app:origDate"/>
                            </div>
                        </div>
                        <div class="comment tp-row" data-template="app:regest">
                            <div class="tp-column">
                                <h4 class="block-title">
                                    <a class="accordion-toggle collapsed" role="button" data-toggle="collapse" href="#regest" aria-expanded="false"
                                        aria-controls="regest">
                                        Regest
                                    </a>
                                </h4>
                                <div id="regest" class="collapse" data-template="app:display-data"/>
                            </div>
                        </div>
                        <div class="comment tp-row" data-template="app:source-description">
                            <div class="tp-column">
                                <h4 class="block-title">
                                    <a class="accordion-toggle collapsed" role="button" data-toggle="collapse" href="#sourceDesc" aria-expanded="false"
                                        aria-controls="regest">
                                        Stückbeschreibung
                                    </a>
                                </h4>
                                <div id="sourceDesc" class="collapse" data-template="app:display-data"/>
                            </div>
                        </div>
                        <div class="comment tp-row" data-template="app:comment">
                            <div class="tp-column">
                                <h4 class="block-title">
                                    <a class="accordion-toggle collapsed" role="button" data-toggle="collapse" href="#comment" aria-expanded="false"
                                        aria-controls="comment">
                                        Kommentar
                                    </a>
                                </h4>
                                <div id="comment" class="collapse" data-template="app:display-data"/>
                            </div>
                        </div>
                        <section class="tp-row">
                            <div class="tp-column">
                                <h4 class="block-title">Editionstext</h4>
                                <div id="document-wrapper">
                                    <!-- Document pane -->
                                    <div id="document-pane">
                                        <div data-template="pages:view" class="content"/>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>
                    <aside id="aside" class="col-md-2">
                        <!--ul class="places" data-template="app:list-places"/-->
                        <!--ul class="persons" data-template="app:list-persons"/>
                        <ul class="persons" data-template="app:list-organizations"/-->
                        <ul class="keywords" data-template="app:list-keys"/>
                        <!--ul class="lemmata" data-template="app:list-lemmata"/-->
                    </aside>
                    <aside id="image-aside" class="col-md-5">
                        <div id="image-container" class="openseadragon"/>
                    </aside>
                </section>
                <div data-template="templates:include" data-template-path="templates/footer-navigation.html"/>
            </div>
        </div>
        <div class="modal fade" id="pdf-info">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <button type="button" class="close" data-dismiss="modal">
                            <span class="fa fa-times" aria-hidden="true"/>
                            <span class="sr-only">
                                <i18n:text key="close">Close</i18n:text>
                            </span>
                        </button>
                        <h4 class="modal-title">
                            <i18n:text key="generating-file">Generating File...</i18n:text>
                        </h4>
                    </div>
                    <div class="modal-body">
                        <p>
                            <i18n:text key="download-message"/>
                        </p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-default" data-dismiss="modal">
                            <i class="glyphicon glyphicon-remove"/> <i18n:text key="close">Close</i18n:text>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
