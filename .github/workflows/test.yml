name: Test ssrq-editio workflow

on:
  pull_request:
    branches: ['dev']
  push:
    branches: ['dev']
  workflow_dispatch:

jobs:
  test-editio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'
      - name: Setup SSH and Python with Poetry
        uses: ./.github/actions/setup
        with:
          ssh-key: ${{ secrets.CLI_SECRET_KEY }}
      - name: Build editio-app
        shell: bash
        run: poetry run editio build --enable-upload dev
      - name: Start the editio-app
        shell: bash
        run: poetry run editio run
      - name: Wait for eXist-DB
        uses: cygnetdigital/wait_for_response@v2.0.0
        with:
          url: 'http://localhost:8080/'
          responseCode: '200'
          timeout: 200000
          interval: 600
      - name: Execute tests
        run: poetry run editio test
