name: Test ssrq-editio workflow

on:
  pull_request:
    branches: ['dev']
  push:
    branches: ['dev']
  workflow_dispatch:

jobs:
  test-editio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.TEI_VOLUMES_PAT }}
          submodules: 'recursive'
      - name: Setup SSH and Python with Poetry
        uses: ./.github/actions/setup
      - name: Build editio-app
        shell: bash
        run: poetry run editio build --enable-upload dev
      - name: Start the editio-app
        shell: bash
        run: poetry run editio run
      - name: Execute tests
        run: poetry run pytest
