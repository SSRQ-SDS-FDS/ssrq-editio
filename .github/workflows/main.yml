name: Test editio and build the APP image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.12]

    name: Test editio on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: 'true'
          token: ${{ secrets.TEI_VOLUMES_PAT }}
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install the project
        run: uv sync --all-extras --dev
      - name: Lint and test
        run: uv run just test

  build:
    needs: test
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/'))
    strategy:
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: 'true'
          token: ${{ secrets.TEI_VOLUMES_PAT }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: image_tags
        run: |
          IMAGE_REPO="ghcr.io/ssrq-sds-fds/ssrq-editio-app"

          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            echo "tags=${IMAGE_REPO}:latest" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          TAG_NAME="${GITHUB_REF_NAME}"
          TAGS="${IMAGE_REPO}:${TAG_NAME}"

          # For release variants like v1.0.0-alpha5, also publish v1.0.0
          if [[ "${TAG_NAME}" == v*.*.*-* ]]; then
            CHANNEL_TAG="${TAG_NAME%%-*}"
            TAGS="${TAGS},${IMAGE_REPO}:${CHANNEL_TAG}"
          fi

          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          tags: ${{ steps.image_tags.outputs.tags }}
