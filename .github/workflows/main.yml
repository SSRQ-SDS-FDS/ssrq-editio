name: Test editio and build the APP image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.11, 3.12]

    name: Test editio on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: 'true'
          token: ${{ secrets.TEI_VOLUMES_PAT }}
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install the project
        run: uv sync --all-extras --dev
      - name: Lint and test
        run: uv run just test

  build:
    needs: test
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/'))
    strategy:
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: 'true'
          token: ${{ secrets.TEI_VOLUMES_PAT }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          tags: ${{ github.ref == 'refs/heads/dev' && 'ghcr.io/ssrq-sds-fds/ssrq-editio-app:latest' || format('ghcr.io/ssrq-sds-fds/ssrq-editio-app:{0}', github.ref_name) }}
