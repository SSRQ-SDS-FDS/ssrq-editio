<?xml version="1.0" encoding="UTF-8"?>
<div
  xmlns:i18n="http://exist-db.org/xquery/i18n"
  data-template="templates:surround"
  data-template-with="templates/page.html"
  data-template-at="content"
>
  <div data-template="ssrq-helper:get-temp">
    <nav
      xmlns:i18n="http://exist-db.org/xquery/i18n"
      class="navbar navbar-default navbar-fixed-top"
      role="navigation"
      data-template="i18n:translate"
      data-catalogues="resources/i18n"
    >
      <div class="container-fluid" data-template="ssrq-helper:resolve-links">
        <div class="navbar-header">
          <button
            type="button"
            class="navbar-toggle"
            data-toggle="collapse"
            data-target="#navbar-collapse-1"
          >
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar" />
            <span class="icon-bar" />
            <span class="icon-bar" />
          </button>
          <a class="navbar-brand logo" href="{app}/">
            <img
              src="{app}/resources/images/SSRQganz-2020.svg"
              data-template="ssrq-helper:insertAlt"
            />
          </a>
        </div>
        <div class="navbar-collapse collapse" id="navbar-collapse-1">
          <ul class="nav navbar-nav">
            <li id="abbr">
              <a href="{app}/about/abbr" class="tp-menu-item">
                <i18n:text key="abbr" />
              </a>
            </li>
            <li>
              <a href="mailto:info@ssrq-sds-fds.ch" class="tp-menu-item">
                <i18n:text key="feedback" />
              </a>
            </li>
          </ul>
          <ul class="nav navbar-nav navbar-right">
            <li>
              <form class="navbar-form">
                <select
                  id="lang-select"
                  name="lang"
                  class="form-control"
                  data-template="templates:form-control"
                >
                  <option value="de">de</option>
                  <option value="fr">fr</option>
                  <option value="en">en</option>
                </select>
              </form>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div
      data-template="templates:include"
      data-template-path="templates/toolbar.html"
    />
    <main id="tp-canvas">
      <section
        id="main-wrapper"
        class="${body-class}"
        data-template="app:parse-params"
      >
        <div class="tp-document-title-wrapper tp-row">
          <div class="tp-column">
            <h5 id="idno" data-template="ssrq-helper:render-idno-as-popup" />
            <h4 data-template="app:header-short" />
            <h5 data-template="app:origDate" />
          </div>
        </div>
        <div class="comment tp-row" data-template="app:regest">
          <div class="tp-column">
            <h4 class="block-title">
              <a
                class="accordion-toggle collapsed"
                role="button"
                data-toggle="collapse"
                href="#regest"
                aria-expanded="false"
                aria-controls="regest"
              >
                <i18n:text key="regest" />
              </a>
            </h4>
            <div
              id="regest"
              class="collapse"
              data-template="app:display-data"
            />
          </div>
        </div>

        <div class="comment tp-row" data-template="app:source-description">
          <div class="tp-column">
            <h4 class="block-title">
              <a
                class="accordion-toggle collapsed"
                role="button"
                data-toggle="collapse"
                href="#sourceDesc"
                aria-expanded="false"
                aria-controls="regest"
              >
                <i18n:text key="describe" />
              </a>
            </h4>
            <div
              id="sourceDesc"
              class="collapse"
              data-template="app:display-data"
            />
          </div>
        </div>
        <!-- <div class="comment tp-row" data-template="app:additional-sources">
          <div class="tp-column">
            <h4 class="block-title">
              <a
                class="accordion-toggle collapsed"
                role="button"
                data-toggle="collapse"
                href="#additional"
                aria-expanded="false"
                aria-controls="additonal"
              >
                <i18n:text key="addFill" />
              </a>
            </h4>
            <div
              id="additional"
              class="collapse"
              data-template="app:display-data"
              data-template-mode="filiation"
            />
          </div>
        </div> -->
        <div class="comment tp-row" data-template="app:comment">
          <div class="tp-column">
            <h4 class="block-title">
              <a
                class="accordion-toggle collapsed"
                role="button"
                data-toggle="collapse"
                href="#comment"
                aria-expanded="false"
                aria-controls="comment"
              >
                <i18n:text key="comment" />
              </a>
            </h4>
            <div
              id="comment"
              class="collapse"
              data-template="app:display-data"
            />
          </div>
        </div>
        <section class="tp-row">
          <div class="tp-column">
            <h4 class="block-title">
              <i18n:text key="editionText" />
            </h4>
            <div id="document-wrapper">
              <div id="document-pane">
                <div data-template="ssrq-helper:render" class="content" />
              </div>
            </div>
          </div>
        </section>
      </section>
      <div
        data-template="templates:if-model-key-equals"
        data-template-key="has-facs"
        data-template-value="false"
      >
        <aside id="aside" class="col-md-2">
          <p class="loading">
            <i18n:text key="loading-facets" />
          </p>
        </aside>
      </div>

      <div
        data-template="templates:if-model-key-equals"
        data-template-key="has-facs"
        data-template-value="true"
      >
        <aside id="image-aside" class="col-md-6">
          <div
            id="credits-container"
            class="credits"
            data-template="app:show-credits"
          />
          <div id="image-container" class="openseadragon" />
        </aside>
        <script
          type="application/javascript"
          src="{app}/resources/scripts/vendor/openseadragon.min.js"
          data-template="ssrq-helper:resolve-links"
        />
      </div>
      <script
        type="application/javascript"
        src="{app}/resources/scripts/services.js"
        data-template="ssrq-helper:resolve-links"
      />
    </main>
  </div>
</div>
