<?xml version="1.0" encoding="UTF-8"?>
<div class="panel panel-info" xmlns:i18n="http://exist-db.org/xquery/i18n">
  <style>
    @charset "UTF-8";

    .fileinput-button {
      position: relative;
      overflow: hidden;
    }
    .fileinput-button input {
      position: absolute;
      top: 0;
      right: 0;
      margin: 0;
      opacity: 0;
      -ms-filter: 'alpha(opacity=0)';
      font-size: 200px;
      direction: ltr;
      cursor: pointer;
    }

    @media screen\9 {
      .fileinput-button input {
        filter: alpha(opacity=0);
        font-size: 100%;
        height: 100%;
      }
    }
  </style>
  <div class="panel-heading">
    <h3 class="panel-title">
      <i18n:text key="upload"/>
    </h3>
  </div>

  <div class="panel-body">
    <p>
      <i18n:text key="upload-files"/>
    </p>

    <span class="btn btn-success btn-block fileinput-button">
      <i class="material-icons">file_upload</i>
      <span>
        <i18n:text key="select-files"/>
      </span>
      <input id="fileupload" type="file" name="files[]" multiple="multiple"/>
    </span>
    <!-- The global progress bar -->
    <div id="progress" class="progress">
      <div class="progress-bar progress-bar-success"/>
    </div>
    <!-- The container for the uploaded files -->
    <table id="files-table" class="files table table-striped">
      <thead>
        <th colspan="2">
          <i18n:text key="uploaded-files"/>
        </th>
      </thead>
      <tbody id="files"/>
    </table>
  </div>

  <script data-template="ssrq-helper:resolve-links" type="application/javascript" src="{app}/resources/scripts/vendor/jquery.ui.widget.js"/>
  <script data-template="ssrq-helper:resolve-links" type="application/javascript" src="{app}/resources/scripts/vendor/jquery.fileupload.js"/>
  <script type="application/javascript">
    $(function () {
      'use strict';
      var root = $("html").data("app");
      $('#fileupload')
        .fileupload({
          url: root + "/temp/",
          dataType: 'json',
          done: function (e, data) {
            $(".error-message").remove();
            $.each(data.result.files, function (index, file) {
              $('<tr/>')
                .append(
                  $('<td/>')
                    .append(
                      $('<a target="_blank"/>')
                        .attr("href", root + "/" + file.path)
                        .html('<span class="material-icons">open_in_new</span>')))
                .append(
                    $('<td/>')
                      .text(file.name))
                .appendTo('#files');
            });
          },
          error: function (e, data) {
            $('<p class="error-message" style="color: red"/>')
              .text(e.responseJSON.error)
              .appendTo('#files');
          },
          progressall: function (e, data) {
            var progress = parseInt((data.loaded / data.total) * 100, 10);
            $('#progress .progress-bar').css('width', progress + '%');
          },
        })
        .prop('disabled', !$.support.fileInput)
        .parent()
        .addClass($.support.fileInput ? undefined : 'disabled');
    });
  </script>
</div>
