repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "ffb6a759a979008c0e6dff86e39f4745a2d9eac4"
    hooks:
      - id: prettier
        types_or: [css, html, javascript]
  - repo: local
    hooks:
      - id: commitizen
        name: commitizen
        entry: cz check
        args: [--commit-msg-file]
        require_serial: true
        language: system
        stages: [commit-msg]
      - id: lint
        name: lint
        entry: just
        args: ["lint"]
        require_serial: true
        language: system
        types: [python]
      - id: fmt
        name: format
        entry: just
        args: ["fmt"]
        require_serial: true
        language: system
        types: [python]
