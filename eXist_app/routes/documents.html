<div
  xmlns:i18n="http://ssrq-sds-fds.ch/exist/apps/ssrq/i18n/module"
  data-template="templates:surround"
  data-template-with="templates/page.html"
  data-template-at="content"
>
  <section
    data-template="lib:include"
    data-template-path="templates/banner.html"
  />
  <nav
    data-template="lib:include"
    data-template-path="templates/breadcrumbs.html"
  />
  <section
    class="flex w-full max-w-5xl lg:px-12 sm:px-4 items-center justify-start mx-auto"
  >
    <form class="my-2 text-sm">
      <label for="doc-search" class="block mb-2 text-xs text-ssrq-greyed-700"
        >Einträge filtern</label
      >
      <div class="flex item-center">
        <input
          id="doc-search"
          type="text"
          autocomplete="off"
          name="q"
          data-template="templates:form-control"
          class="px-4 py-1 min-w-[16rem] text-sm text-ssrq-greyed-800 bg-white border rounded-md focus:border-ssrq-primary focus:border-[0.025rem] focus:outline-none focus:ring focus:ring-ssrq-primary focus:ring-opacity-40"
          placeholder="IDNO / Titel"
          hx-get="{app}/{kanton}/{volume}/?lang={lang}"
          hx-indicator="#loading-overlay"
          hx-params="not per-page,page lang"
          hx-push-url="true"
          hx-trigger="input changed delay:500ms, submit"
          hx-target="body"
        /><!--
        <button
          class="px-4 py-2 text-sm font-medium text-white transition-colors duration-300 transform bg-ssrq-primary rounded-md ml-1 hover:shadow-sm focus:outline-none focus:shadow-sm"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-3.5 h-3.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v16.5c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9zm3.75 11.625a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"
            />
          </svg>
        </button> -->
        <a
          href="{app}/{kanton}/{volume}"
          class="px-4 py-2 text-sm font-medium text-white transition-colors duration-300 transform bg-ssrq-primary rounded-md ml-1 hover:shadow-sm focus:outline-none focus:shadow-sm"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-3.5 h-3.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"
            />
          </svg>
        </a>
      </div>
    </form>
  </section>
  <section data-template="documents:list" data-template-per-page="25"></section>
  <script
    src="{app}/resources/js/routes/documents.js"
    type="module"
    data-template="template-utils:resolve-links"
  ></script>
</div>
