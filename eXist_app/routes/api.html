<div
  xmlns:i18n="http://ssrq-sds-fds.ch/exist/apps/ssrq/i18n/module"
  data-template="templates:surround"
  data-template-with="templates/page.html"
  data-template-at="content"
>
  <style>
    pre.version {
      background-color: transparent;
      border: none;
    }
  </style>
  <div id="basic" />
  <script
    src="https://unpkg.com/swagger-ui-dist@4/swagger-ui-bundle.js"
    charset="UTF-8"
  />
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = "https://unpkg.com/swagger-ui-dist@4/swagger-ui.css";
      document.head.appendChild(link);
      SwaggerUIBundle({
        url: "api.json",
        dom_id: "#basic",
        displayOperationId: true,
        displayRequestDuration: true,
        showExtensions: true,
        withCredentials: true,
      });
    });
  </script>
</div>
