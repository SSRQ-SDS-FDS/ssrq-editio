<div
  xmlns:i18n="http://ssrq-sds-fds.ch/exist/apps/ssrq/i18n/module"
  data-template="templates:surround"
  data-template-with="templates/page.html"
  data-template-at="content"
>
  <header data-template="toolbar:container" data-template-tools="xml" />
  <nav
    data-template="lib:include"
    data-template-path="templates/breadcrumbs.html"
  />
  <div data-template="template-utils:load-by-idno">
    <article class="centered-section mt-4 mb-16 paratexts px-3">
      <h1 data-template="paratext:page-title" />
      <div data-template="paratext:toc" />
      <div data-template="paratext:render-content" />
    </article>
  </div>
  <a data-template="lib:include" data-template-path="templates/to-top.html" />
  <script type="module" src="{app}/resources/js/routes/paratexts.js" />
</div>
