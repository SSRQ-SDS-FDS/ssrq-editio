<div
  xmlns:i18n="http://ssrq-sds-fds.ch/exist/apps/ssrq/i18n/module"
  data-template="templates:surround"
  data-template-with="templates/page.html"
  data-template-at="content"
>
  <nav
    data-template="lib:include"
    data-template-path="templates/breadcrumbs.html"
  />
  <section
    class="max-w-5xl lg:px-12 sm:px-4 mx-auto mt-4 mb-9 flex flex-col items-center"
    data-template="volumes:list"
  >
    <article
      class="volume w-full px-8 py-4 bg-white rounded-lg shadow-md my-2"
      data-template="templates:each"
      data-template-from="volumes"
      data-template-to="volume"
    >
      <header class="flex items-center justify-between">
        <span class="text-sm volume-id" data-template="volumes:id">ID</span>
        <span data-template="volumes:count">COUNT</span>
      </header>

      <div data-template="volumes:render-volume-title">
        VOLUME-TITLE and EDITOR
      </div>

      <footer class="mt-4 flex">
        <a data-template="volumes:render-links" />
      </footer>
    </article>
  </section>
</div>
