<header
  xmlns:i18n="http://ssrq-sds-fds.ch/exist/apps/ssrq/i18n/module"
  xmlns:x-on="https://alpinejs.dev/"
  xmlns:x-bind="https://alpinejs.dev/"
  xmlns:x-transition="https://alpinejs.dev/"
  x-data="{ open: false }"
  data-template="template-utils:resolve-links"
>
  <nav
    class="bg-ssrq-secondary z-30 fixed shadow h-16 w-full sm:px-4 lg:px-12 py-1 flex items-center border-t-4 border-t-ssrq-primary"
  >
    <div class="flex justify-between sm:flex-grow-1 w-full lg:w-auto">
      <a href="{app}/">
        <img
          src="{app}/resources/images/ssrq-logo.png"
          class="w-auto max-h-12 pb-1.5"
          data-template="ssrq-helper:insertAlt"
        />
      </a>
      <button
        type="button"
        class="text-ssrq-greyed-700 hover:text-ssrq-primary focus:outline-none focus:text-gray-600 lg:hidden"
        aria-label="toggle menu"
        x-on:click="open = !open"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5"
          />
        </svg>
      </button>
    </div>
    <div class="hidden lg:flex flex-grow-1 px-2">
      <a data-template="nav:menu-links" />
    </div>

    <div class="hidden ml-auto lg:flex items-center">
      <div class="relative" x-data="{ search: false }">
        <form action="{app}/search" method="get" x-show="search">
          <input
            x-on:click.away="search = false"
            type="text"
            name="query"
            class="min-w-[20rem] w-auto max-w-[28rem] py-1 pl-2 pr-2 placeholder-ssrq-greyed-600 bg-transparent border-[0.02rem] border-black focus:outline-none focus:border-gray-600 rounded-sm"
            placeholder="i18n(search)"
          />
        </form>
        <span
          class="absolute inset-y-0 right-0 flex items-center pr-1 hover:cursor-pointer"
          x-on:click="search = true"
        >
          <i class="icon is-small">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg>
          </i>
        </span>
      </div>
      <details class="sm:hidden relative lg:inline-block text-left ml-1.5">
        <summary
          class="inline-flex items-center justify-center w-full rounded-md shadow-sm py-2 hover:bg-none focus:outline-none cursor-pointer text-sm"
          title="i18n(language)"
        >
          <i class="icon is-small"
            ><svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418"
              />
            </svg>
          </i>
          <span class="pl-0.75" data-template="nav:active-lang">DEU</span>
        </summary>
        <ul
          class="origin-top-right absolute right-0 mt-0.75 w-auto rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5"
        >
          <li data-template="nav:lang-selections" />
        </ul>
      </details>
    </div>
  </nav>
  <template x-if="open">
    <div
      x-data="{ show: false }"
      x-init="$nextTick(() => { show = true })"
      x-show="show"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="transform translate-x-full"
      x-transition:enter-end="transform translate-x-0"
      x-transition:leave="transition ease-in duration-300"
      x-transition:leave-start="transform translate-x-0"
      x-transition:leave-end="transform translate-x-full"
      class="bg-ssrq-greyed-50 w-64 fixed top-0 right-0 h-full z-50 transform border-t-4 border-t-ssrq-primary"
    >
      <!-- Mobile Menu close button -->
      <button
        class="mobile-menu-close-button absolute top-0 right-0 p-4 focus:outline-none"
        x-on:click="open = !open"
      >
        <svg
          class="hover:text-ssrq-primary w-5 h-5 text-ssrq-greyed-700"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
      <div class="flex flex-col items-start p-4 h-full">
        <a class="menu-link" href="{app}/search">
          <i18n:text key="search">Suche</i18n:text>
        </a>
        <a data-template="nav:menu-links" />
        <div class="mt-auto border-t-2 border-t-ssrq-greyed-500 w-full">
          <h6 class="mt-1 px-2.5 text-sm font-bold">
            <i18n:text key="additional-languages">Sprache</i18n:text>
          </h6>
          <ul class="mobile-lang-selector">
            <li data-template="nav:lang-selections" />
          </ul>
        </div>
      </div>
    </div>
  </template>
  <div
    x-show="open"
    class="hidden fixed inset-0 bg-black bg-opacity-50 z-20"
  ></div>
</header>
