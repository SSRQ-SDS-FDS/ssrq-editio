<?xml version="1.0" encoding="UTF-8"?>
<header
  xmlns:i18n="http://ssrq-sds-fds.ch/exist/apps/ssrq/i18n/module"
  class="tp-toolbar"
  data-template="i18n:translate"
>
  <div
    data-template="templates:if-parameter-set"
    data-template-param="toggle-odd"
  >
    <a
      class="btn btn-default"
      data-template="app:switch-view"
      title="i18n(view-switch)"
    >
      <i class="material-icons">check_box_outline_blank</i>
      <span class="hidden-xs">
        <i18n:text key="view-normalized">Normalisiert</i18n:text>
      </span>
    </a>
  </div>
  <div
    class="tp-buttongrp"
    data-template="template-utils:resolve-links"
    data-template-add-lang-param="false"
  >
    <div data-template="templates:if-parameter-set" data-template-param="doc">
      <a
        target="_blank"
        class="btn btn-default"
        href="{app}/{kanton}/{volume}/{doc}.xml"
        title="i18n(view-tei)"
      >
        <i class="material-icons">code</i>
        <i18n:text key="view-tei">XML/TEI</i18n:text>
      </a>
    </div>
    <div
      data-template="templates:if-parameter-set"
      data-template-param="paratext"
    >
      <a
        target="_blank"
        class="btn btn-default"
        href="{app}/{kanton}/{volume}/{paratext}.xml"
        title="i18n(view-tei)"
      >
        <i class="material-icons">code</i>
        <i18n:text key="view-tei">XML/TEI</i18n:text>
      </a>
    </div>
    <a
      target="_blank"
      class="btn btn-default"
      title="i18n(pdf-latex)"
      data-template="template-utils:display-pdf-download"
    >
      <i class="material-icons">print</i>
      <i18n:text key="pdf-latex">PDF</i18n:text>
    </a>
  </div>
  <div class="tp-buttongrp hidden-xs">
    <button class="btn btn-default" id="zoom-in" title="i18n(zoom-in)">
      <i class="material-icons">zoom_in</i>
    </button>
    <button class="btn btn-default" id="zoom-out" title="i18n(zoom-out)">
      <i class="material-icons">zoom_out</i>
    </button>
  </div>
</header>
